name: "Flutter bootstrap via Key Vault (private deps + platform config)"
description: "Mints an installation token, configures git, runs flutter pub get, and enables requested Flutter targets."

inputs:
  flutter_version:
    required: true
  owner:
    required: true
  repositories:
    required: true

  targets:
    description: >
      Comma-separated platforms to enable; all others are disabled.
      Allowed: web, android, ios, linux, macos, windows, fuchsia.
      Example: "android,ios" or "android" (App Distribution builds).
    required: false
    default: "android,ios"

runs:
  using: "composite"
  steps:
    - name: Setup Flutter
      uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # v2.22.0
      with:
        flutter-version: ${{ inputs.flutter_version }}
        channel: "stable"
        cache: true

    - name: Configure Flutter platforms
      shell: bash
      run: |
        set -euo pipefail
        RAW=$(echo "${{ inputs.targets }}" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
        TARGETS_ARR=()
        if [ -n "$RAW" ]; then
          IFS=',' read -ra PARTS <<< "$RAW"
          for p in "${PARTS[@]}"; do
            [ -n "$p" ] && TARGETS_ARR+=("$p")
          done
        fi
        if [ ${#TARGETS_ARR[@]} -eq 0 ]; then
          TARGETS_ARR=(android ios)
        fi
        has() {
          local n="$1"
          for x in "${TARGETS_ARR[@]}"; do
            [ "$x" = "$n" ] && return 0
          done
          return 1
        }
        for t in "${TARGETS_ARR[@]}"; do
          case "$t" in
            web|android|ios|linux|macos|windows|fuchsia) ;;
            *) echo "::error::Unknown flutter-bootstrap targets entry '$t'. Use: web, android, ios, linux, macos, windows, fuchsia"; exit 1 ;;
          esac
        done
        if has web; then flutter config --enable-web; else flutter config --no-enable-web; fi
        if has android; then flutter config --enable-android; else flutter config --no-enable-android; fi
        if has ios; then flutter config --enable-ios; else flutter config --no-enable-ios; fi
        if has linux; then flutter config --enable-linux-desktop; else flutter config --no-enable-linux-desktop; fi
        if has macos; then flutter config --enable-macos-desktop; else flutter config --no-enable-macos-desktop; fi
        if has windows; then flutter config --enable-windows-desktop; else flutter config --no-enable-windows-desktop; fi
        if has fuchsia; then flutter config --enable-fuchsia; else flutter config --no-enable-fuchsia; fi

    - name: Cache Flutter dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.pub-cache
          **/.dart_tool/package_config.json
        key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-flutter-

    - name: Get dependencies
      shell: bash
      run: flutter pub get
