org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation breaks on Windows when the project and Pub cache
# live on different drive letters (e.g. D:\… vs C:\Users\…\Pub\Cache), with errors like
# "this and base files have different roots" during compileReleaseKotlin / plugin builds.
kotlin.incremental=false
